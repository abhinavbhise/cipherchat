<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CipherChat</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="/static/favicon2.png">
</head>
<body>

    <div class="chat-wrapper">
        <div class="sidebar">
            <h2>CipherChat</h2>
            <div class="info-box">
                <p><strong>Your Identity:</strong> <span id="display-name">Not Set</span></p>
                <p><strong>Your Key:</strong> <span id="display-key" class="highlight">Waiting...</span></p>
            </div>
            <div class="instructions">
                <p>Type <strong>@username message</strong> to send a private encrypted message.</p>
            </div>
        </div>

        <div class="main-chat">
            <div class="chat-header">Global Encrypted Channel</div>
            <div class="message-area" id="message-container">
                </div>
            <div class="input-area">
                <input type="text" id="user-input" placeholder="Type your message here..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const socket = io({ transports: ["websocket"] });
        let myEncryptionKey = "";
        
        // Prompt for username on load
        let currentUsername = prompt("Welcome to CipherChat. Enter your username:");
        if (!currentUsername) currentUsername = "Guest" + Math.floor(Math.random() * 1000);
        
        document.getElementById("display-name").innerText = currentUsername;
        socket.emit('join_chat', { username: currentUsername });

        // Decryption function mirroring the Python logic
        function xorDecrypt(text, key) {
            if (!key) return text;
            let result = "";
            for (let i = 0; i < text.length; i++) {
                result += String.fromCharCode(text.charCodeAt(i) ^ key.charCodeAt(i % key.length));
            }
            return result;
        }

        function sendMessage() {
            let inputField = document.getElementById("user-input");
            let messageText = inputField.value.trim();
            
            if (messageText !== "") {
                socket.emit('send_message', { message: messageText });
                inputField.value = ""; // Clear the input box
            }
        }

        function handleKeyPress(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        }

        // Listen for incoming messages from the server
        socket.on('server_message', function(data) {
            const container = document.getElementById("message-container");
            const newDiv = document.createElement("div");

            if (data.type === 'system') {
                newDiv.className = "system-message";
                newDiv.innerText = data.content;
                
                // Extract the key if the server assigns one
                if (data.content.includes("XOR key is:")) {
                    let parts = data.content.split("key is: ");
                    myEncryptionKey = parts[1];
                    document.getElementById("display-key").innerText = myEncryptionKey;
                }
            } else {
                // Determine if the message is from me or someone else
                if (data.sender === currentUsername || data.sender.includes("(Private to")) {
                    newDiv.className = "message bubble-mine";
                } else {
                    newDiv.className = "message bubble-other";
                }

                // If the message is marked 'is_raw', skip decryption (used for self-viewing private messages)
                let finalContent = data.is_raw ? data.content : xorDecrypt(data.content, myEncryptionKey);
                
                // Extract a snippet of the raw cipher to prove encryption is happening
                let cipherProof = data.content.substring(0, 15) + "...";

                newDiv.innerHTML = `
                    <div class="sender-name">${data.sender}</div>
                    <div class="message-text">${finalContent}</div>
                    <div class="cipher-proof">Ciphertext: ${cipherProof}</div>
                `;
            }

            container.appendChild(newDiv);
            container.scrollTop = container.scrollHeight; // Keep chat scrolled to bottom
        });
    </script>
</body>
</html>
